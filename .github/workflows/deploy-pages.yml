name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ROOM_SERVER_URL: ${{ vars.ROOM_SERVER_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate ROOM_SERVER_URL
        run: |
          if [ -z "${ROOM_SERVER_URL}" ]; then
            echo "::error::GitHub Actions variable ROOM_SERVER_URL is not set."
            echo "::error::Set it in Settings > Secrets and variables > Actions > Variables."
            exit 1
          fi

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Compute base href
        id: base_href
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          if [[ "${REPO_NAME}" == *.github.io ]]; then
            echo "value=/" >> "${GITHUB_OUTPUT}"
          else
            echo "value=/${REPO_NAME}/" >> "${GITHUB_OUTPUT}"
          fi

      - name: Build Flutter web app
        run: >
          flutter build web --release
          --base-href "${{ steps.base_href.outputs.value }}"
          --dart-define=ROOM_SERVER_URL="${ROOM_SERVER_URL}"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
